<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Yent: Worldmodel</title>
<style>
  :root {
    color-scheme: light;
    --paper: #fbfaf7;
    --paper-2: #f3f1eb;
    --ink: #0d0d0b;
    --ink-2: #494843;
    --ink-3: #85837c;
    --ink-4: #bbb8ad;
    --line: #d8d5cc;
    --hair: #ece8de;
    --accent: #c5446b;
    --blue: #477aa8;
    --green: #557b60;
    --amber: #a06e2e;
    --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    --serif: ui-serif, Georgia, "Times New Roman", serif;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  * { box-sizing: border-box; }
  html, body { width: 100%; height: 100%; margin: 0; }
  body {
    overflow: hidden;
    color: var(--ink);
    background: var(--paper);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
    user-select: none;
  }

  #field {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100dvh;
    display: block;
    background: var(--paper);
  }

  .topbar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 3;
    min-height: 62px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 24px;
    padding: 14px max(20px, env(safe-area-inset-left)) 12px max(20px, env(safe-area-inset-left));
    border-bottom: 1px solid rgba(216, 213, 204, 0.72);
    background: rgba(251, 250, 247, 0.82);
    backdrop-filter: blur(18px);
  }

  .brand {
    min-width: 0;
    display: flex;
    align-items: baseline;
    gap: 12px;
  }

  .brand strong {
    font-family: var(--mono);
    font-size: 13px;
    letter-spacing: 0.24em;
    color: var(--ink);
  }

  .brand span {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--ink-3);
    letter-spacing: 0.06em;
    white-space: nowrap;
  }

  .hud {
    display: grid;
    grid-template-columns: repeat(9, max-content);
    gap: 14px;
    align-items: center;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--ink-3);
  }

  .hud b {
    color: var(--ink);
    font-weight: 650;
    font-variant-numeric: tabular-nums;
  }

  .hud .debt b { color: var(--accent); }
  .hud .cons b { color: var(--blue); }
  .hud .field b { color: var(--green); }
  .hud .entropy b { color: var(--amber); }
  .hud .prob b,
  .hud .tail b { color: var(--accent); }

  .composer {
    position: fixed;
    left: max(22px, env(safe-area-inset-left));
    right: max(22px, env(safe-area-inset-right));
    bottom: max(18px, env(safe-area-inset-bottom));
    z-index: 4;
    display: grid;
    grid-template-columns: minmax(220px, 1fr) auto;
    gap: 12px;
    align-items: end;
  }

  .prompt-box {
    min-height: 70px;
    display: grid;
    grid-template-columns: 58px 1fr;
    align-items: center;
    overflow: hidden;
    border: 1px solid rgba(216, 213, 204, 0.9);
    border-radius: 16px;
    background: rgba(251, 250, 247, 0.86);
    box-shadow: 0 18px 70px rgba(30, 28, 22, 0.08);
    backdrop-filter: blur(18px);
  }

  .prompt-mark {
    height: 100%;
    display: grid;
    place-items: center;
    border-right: 1px solid var(--hair);
    color: var(--blue);
    font-family: var(--mono);
    font-size: 18px;
  }

  #prompt {
    width: 100%;
    min-width: 0;
    border: 0;
    outline: 0;
    padding: 0 18px;
    background: transparent;
    color: var(--ink);
    font-family: var(--serif);
    font-size: 20px;
  }

  #prompt::placeholder {
    color: var(--ink-4);
  }

  .controls {
    display: grid;
    grid-auto-flow: column;
    gap: 10px;
  }

  .control {
    width: 88px;
    min-height: 70px;
    display: grid;
    align-content: center;
    gap: 7px;
    padding: 10px 14px;
    border: 1px solid rgba(216, 213, 204, 0.9);
    border-radius: 16px;
    background: rgba(251, 250, 247, 0.86);
    box-shadow: 0 18px 70px rgba(30, 28, 22, 0.07);
    backdrop-filter: blur(18px);
  }

  .control label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--ink-3);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .control input {
    width: 100%;
    border: 0;
    border-bottom: 1px solid var(--line);
    outline: 0;
    background: transparent;
    color: var(--ink);
    font-family: var(--mono);
    font-size: 16px;
  }

  button {
    width: 102px;
    min-height: 70px;
    border: 1px solid rgba(13, 13, 11, 0.22);
    border-radius: 16px;
    background: rgba(13, 13, 11, 0.93);
    color: #fbfaf7;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 750;
    letter-spacing: 0.16em;
    cursor: pointer;
  }

  button:disabled {
    opacity: 0.5;
    cursor: default;
  }

  .side-note {
    position: fixed;
    left: max(22px, env(safe-area-inset-left));
    bottom: calc(max(18px, env(safe-area-inset-bottom)) + 92px);
    z-index: 2;
    max-width: 360px;
    font-family: var(--mono);
    font-size: 10px;
    line-height: 1.75;
    letter-spacing: 0.04em;
    color: rgba(73, 72, 67, 0.72);
  }

  @media (max-width: 900px) {
    .hud { grid-template-columns: repeat(3, max-content); gap: 8px 14px; }
    .composer { grid-template-columns: 1fr; }
    .controls { grid-template-columns: repeat(3, 1fr); grid-auto-flow: row; }
    .control, button { width: 100%; min-height: 58px; }
    .side-note { display: none; }
  }

  @media (max-width: 620px) {
    .topbar { align-items: flex-start; flex-direction: column; gap: 7px; }
    .brand span { display: none; }
    #prompt { font-size: 17px; }
  }
</style>
</head>
<body>
<canvas id="field"></canvas>

<header class="topbar">
  <div class="brand">
    <strong>YENT</strong>
    <span>WORLDMODEL / PROBABILITY SPACE</span>
  </div>
  <div class="hud">
    <span>TOK/S <b id="hud-tok">0.0</b></span>
    <span>STEP <b id="hud-step">0</b></span>
    <span class="entropy">ENT <b id="hud-ent">0.00</b></span>
    <span class="debt">DEBT <b id="hud-debt">0.00</b></span>
    <span class="cons">CONS <b id="hud-cons">0.62</b></span>
    <span class="field">FIELD <b id="hud-field">1.00</b></span>
    <span class="prob">P <b id="hud-prob">-</b></span>
    <span>RANK <b id="hud-rank">-</b></span>
    <span class="tail">TAIL <b id="hud-tail">-</b></span>
  </div>
</header>

<div class="side-note" id="status-note">FIELD QUIET.</div>

<form class="composer" id="composer">
  <div class="prompt-box">
    <div class="prompt-mark">&gt;</div>
    <input id="prompt" autocomplete="off" placeholder="inject into the field">
  </div>
  <div class="controls">
    <div class="control">
      <label for="temp">temp</label>
      <input id="temp" type="number" min="0" max="2" step="0.1" value="0.8">
    </div>
    <div class="control">
      <label for="max-tokens">max</label>
      <input id="max-tokens" type="number" min="1" max="512" step="1" value="512">
    </div>
    <button id="send" type="submit">SEND</button>
  </div>
</form>

<script src="/worldmodel/worldmodel.js"></script>
</body>
</html>
