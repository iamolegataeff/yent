<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Yent: Janus Parliament</title>
<style>
  :root {
    color-scheme: dark;
    --bg: #050607;
    --panel: rgba(10, 13, 17, 0.76);
    --panel-strong: rgba(12, 16, 22, 0.92);
    --line: rgba(229, 231, 235, 0.13);
    --text: #f3f4f6;
    --muted: #9ca3af;
    --faint: #4b5563;
    --red: #e26457;
    --cyan: #55a7d8;
    --amber: #d5b96f;
    --green: #77bc91;
    --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    --sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    --serif: Georgia, "Times New Roman", serif;
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
  }

  #field {
    position: fixed;
    inset: 0;
    display: block;
    width: 100vw;
    height: 100dvh;
    background: #050607;
  }

  .topbar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 4;
    min-height: 58px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    padding: 12px max(18px, env(safe-area-inset-left)) 10px max(18px, env(safe-area-inset-left));
    border-bottom: 1px solid var(--line);
    background: rgba(5, 6, 7, 0.74);
    backdrop-filter: blur(10px);
  }

  .brand {
    display: flex;
    align-items: baseline;
    flex-wrap: wrap;
    gap: 12px;
    min-width: 0;
    letter-spacing: 0;
  }

  .brand strong {
    font-family: var(--mono);
    font-size: 13px;
    letter-spacing: 0.18em;
    color: var(--text);
  }

  .brand span {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
  }

  .mode-switch {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    padding: 3px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.04);
  }

  .mode-switch a {
    display: inline-flex;
    min-height: 24px;
    align-items: center;
    padding: 0 8px;
    border-radius: 6px;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 10px;
    text-decoration: none;
  }

  .mode-switch a[aria-current="page"] {
    background: rgba(85, 167, 216, 0.14);
    color: var(--text);
  }

  .hud {
    display: grid;
    grid-template-columns: repeat(8, max-content);
    gap: 14px;
    align-items: center;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
  }

  .hud b {
    color: var(--text);
    font-weight: 700;
  }

  .hud .debt b { color: var(--red); }
  .hud .cons b { color: var(--cyan); }
  .hud .field b { color: var(--green); }
  .hud .prob b,
  .hud .tail b { color: var(--amber); }

  .answer-shell {
    position: fixed;
    top: 82px;
    right: max(26px, env(safe-area-inset-right));
    bottom: 116px;
    z-index: 3;
    width: min(610px, 42vw);
    min-width: 420px;
    display: flex;
    flex-direction: column;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--panel);
    backdrop-filter: blur(14px);
    box-shadow: 0 26px 90px rgba(0, 0, 0, 0.42);
  }

  .answer-head {
    height: 42px;
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 14px;
    border-bottom: 1px solid var(--line);
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
  }

  .answer-head .state {
    color: var(--amber);
  }

  #transcript {
    flex: 1 1 auto;
    overflow: auto;
    padding: 18px;
    scrollbar-width: thin;
    scrollbar-color: var(--faint) transparent;
  }

  .turn {
    display: grid;
    gap: 7px;
    margin: 0 0 18px;
  }

  .role {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--faint);
    letter-spacing: 0.16em;
  }

  .text {
    white-space: pre-wrap;
    line-height: 1.55;
    font-size: 15px;
    color: var(--text);
  }

  .turn.user {
    margin-left: 8%;
  }

  .turn.user .text {
    padding: 11px 13px;
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.08);
    color: #fff;
  }

  .turn.assistant .text {
    font-family: var(--serif);
    font-size: 18px;
    line-height: 1.58;
  }

  .composer {
    position: fixed;
    left: max(22px, env(safe-area-inset-left));
    right: max(22px, env(safe-area-inset-right));
    bottom: max(18px, env(safe-area-inset-bottom));
    z-index: 5;
    display: grid;
    grid-template-columns: minmax(220px, 1fr) auto;
    gap: 12px;
    align-items: end;
  }

  .prompt-box {
    display: grid;
    grid-template-columns: auto 1fr;
    align-items: center;
    min-height: 66px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--panel-strong);
    backdrop-filter: blur(16px);
    overflow: hidden;
  }

  .prompt-mark {
    width: 52px;
    height: 100%;
    display: grid;
    place-items: center;
    color: var(--cyan);
    font-family: var(--mono);
    font-size: 18px;
    border-right: 1px solid var(--line);
  }

  #prompt {
    width: 100%;
    min-width: 0;
    border: 0;
    outline: 0;
    background: transparent;
    color: var(--text);
    font: 15px var(--mono);
    padding: 0 16px;
  }

  #prompt::placeholder { color: #6b7280; }

  .controls {
    display: grid;
    grid-template-columns: 72px 74px 82px;
    gap: 8px;
    align-items: stretch;
  }

  .control {
    min-height: 66px;
    display: grid;
    align-content: center;
    gap: 5px;
    padding: 9px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--panel-strong);
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
  }

  .control input {
    width: 100%;
    border: 0;
    border-bottom: 1px solid var(--line);
    background: transparent;
    color: var(--text);
    font: 13px var(--mono);
    outline: 0;
  }

  #send {
    border: 1px solid rgba(85, 167, 216, 0.46);
    border-radius: 8px;
    background: rgba(85, 167, 216, 0.12);
    color: var(--text);
    font: 700 12px var(--mono);
    letter-spacing: 0.12em;
    cursor: pointer;
  }

  #send:disabled {
    cursor: default;
    opacity: 0.55;
  }

  .ribbon {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 94px;
    height: 22px;
    z-index: 2;
    pointer-events: none;
    opacity: 0.82;
  }

  #trace {
    width: 100%;
    height: 100%;
    display: block;
  }

  .sr-only {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
  }

  @media (max-width: 980px) {
    .hud {
      grid-template-columns: repeat(3, max-content);
      gap: 10px 14px;
    }

    .answer-shell {
      left: 18px;
      right: 18px;
      top: auto;
      bottom: 106px;
      width: auto;
      min-width: 0;
      height: min(46dvh, 430px);
    }

    .composer {
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .controls {
      grid-template-columns: 72px 74px 1fr;
    }

    .ribbon { bottom: 170px; }
  }

  @media (max-width: 620px) {
    .topbar {
      align-items: flex-start;
      flex-direction: column;
      gap: 8px;
      min-height: 88px;
    }

    .brand span { display: none; }

    .hud {
      width: 100%;
      grid-template-columns: repeat(3, 1fr);
      font-size: 10px;
    }

    .answer-shell {
      left: 12px;
      right: 12px;
      bottom: 151px;
      height: min(45dvh, 390px);
    }

    .answer-head {
      height: 36px;
      font-size: 10px;
    }

    #transcript { padding: 13px; }
    .turn.assistant .text { font-size: 16px; }
    .turn.user { margin-left: 0; }

    .composer {
      left: 12px;
      right: 12px;
    }

    .prompt-box { min-height: 58px; }
    .prompt-mark { width: 42px; }
    .controls { grid-template-columns: 1fr 1fr 1fr; }
    .control { min-height: 52px; padding: 7px; }
    .ribbon { bottom: 216px; }
  }
</style>
</head>
<body>
<canvas id="field" aria-hidden="true"></canvas>

<header class="topbar">
  <div class="brand">
    <strong>YENT</strong>
    <nav class="mode-switch" aria-label="Interface mode">
      <a href="/yent" aria-current="page">JANUS</a>
      <a href="/worldmodel">WORLD</a>
    </nav>
    <span>DOE JANUS INTERFACE</span>
  </div>
  <div class="hud">
    <div>TOK/S <b id="hud-tok">0.0</b></div>
    <div>EXPERTS <b id="hud-exp">0</b></div>
    <div class="debt">DEBT <b id="hud-debt">0.00</b></div>
    <div class="cons">CONS <b id="hud-cons">0.00</b></div>
    <div class="field">FIELD <b id="hud-field">1.00</b></div>
    <div class="prob">P <b id="hud-prob">-</b></div>
    <div>RANK <b id="hud-rank">-</b></div>
    <div class="tail">TAIL <b id="hud-tail">-</b></div>
  </div>
</header>

<section class="answer-shell" aria-label="Conversation">
  <div class="answer-head">
    <span>YOU EXIST. NO TRANSLATION.</span>
    <span class="state" id="run-state">IDLE</span>
  </div>
  <main id="transcript" aria-live="polite"></main>
</section>

<div class="ribbon">
  <canvas id="trace"></canvas>
</div>

<form class="composer" id="composer">
  <label class="sr-only" for="prompt">Message</label>
  <div class="prompt-box">
    <span class="prompt-mark">&gt;</span>
    <input id="prompt" type="text" autocomplete="off" placeholder="speak to Yent">
  </div>
  <div class="controls">
    <label class="control">TEMP
      <input id="temp" type="number" min="0" max="2" step="0.05" value="0.8">
    </label>
    <label class="control">MAX
      <input id="max-tokens" type="number" min="1" max="512" step="1" value="512">
    </label>
    <button id="send" type="submit">SEND</button>
  </div>
</form>

<script src="/worldmodel/interface_session.js"></script>
<script src="/worldmodel/event_stream.js"></script>
<script src="/worldmodel/yent.js"></script>
</body>
</html>
